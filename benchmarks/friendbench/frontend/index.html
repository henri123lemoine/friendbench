<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FriendBench™</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <meta name="description" content="The official friendliness benchmark for LLMs" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Inter, system-ui, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f8f9fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 95%;
      margin: 0 auto;
    }

    .quotes-section {
      padding: 20px;
    }

    .quotes-title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #333;
    }

    .quotes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .quote-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
      position: relative;
    }

    .quote-card:hover {
      transform: translateY(-5px);
    }

    .quote-text {
      font-size: 16px;
      margin-bottom: 16px;
      color: #2c3e50;
      font-style: italic;
    }

    .quote-attribution {
      font-size: 14px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .model-info {
      display: inline-flex;
      align-items: center;
      cursor: help;
      margin-left: 4px;
    }

    .model-icon {
      width: 16px;
      height: 16px;
      fill: #1a73e8;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .model-icon:hover {
      opacity: 1;
    }

    .model-inline {
      color: #1a73e8;
      font-weight: 500;
      margin-left: 4px;
    }

    .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
      z-index: 1000;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px;
      border-style: solid;
      border-color: #333 transparent transparent transparent;
    }

    .model-info:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .quotes-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="chart-container"></div>
    <div class="quotes-section">
      <h2 class="quotes-title">Some thoughts from our High Taste Testers™</h2>
      <div id="quotes-grid" class="quotes-grid"></div>
    </div>
  </div>

  <script type="module">
    const response = await fetch('/api/data');

    if (!response.ok) {
      console.error('Function response not ok:', response.status, response.statusText);
      const errorText = await response.text();
      console.error('Error response body:', errorText);
      throw new Error(`Failed to fetch data: ${response.status} ${response.statusText}`);
    }

    let responseData;
    try {
      responseData = await response.json();
    } catch (error) {
      console.error('Failed to parse JSON response');
      const responseText = await response.text();
      console.error('Response body:', responseText);
      throw new Error('Invalid JSON response from server');
    }

    if (responseData.error) {
      console.error('Server error:', responseData.error);
      throw new Error(`Server error: ${responseData.error}`);
    }

    const {models: modelData, quotes: quotesData} = responseData;

    // Filter by models query parameter if provided
    const params = new URLSearchParams(window.location.search);
    const selected = params.get('models');
    const showAll = params.get('showAll') === 'true';

    let filteredModels = selected
      ? modelData.filter(m => selected.split(',').map(s => s.trim()).includes(m.name))
      : modelData;

    // Filter out hidden models unless showAll is true
    if (!showAll) {
      filteredModels = filteredModels.filter(m => !m.hidden);
    }

    // Sort models by score in descending order
    const sortedData = [...filteredModels].sort((a, b) => b.score - a.score);

    // Helper: SVG path for a rect with only top corners rounded
    const roundedTopRect = (x, y, w, h, r) => {
      r = Math.min(r, w / 2, h);
      return `M${x},${y + h} L${x},${y + r} Q${x},${y} ${x + r},${y} L${x + w - r},${y} Q${x + w},${y} ${x + w},${y + r} L${x + w},${y + h} Z`;
    };

    // Helper: SVG path for a rect with only right corners rounded (horizontal bars)
    const roundedRightRect = (x, y, w, h, r) => {
      r = Math.min(r, h / 2, w);
      return `M${x},${y} L${x + w - r},${y} Q${x + w},${y} ${x + w},${y + r} L${x + w},${y + h - r} Q${x + w},${y + h} ${x + w - r},${y + h} L${x},${y + h} Z`;
    };

    // Measure actual SVG rendered text width
    const measureSvgTextWidth = (text, fontSize = 12, fontFamily = 'Inter, system-ui, sans-serif') => {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
      textEl.setAttribute("font-family", fontFamily);
      textEl.setAttribute("font-size", fontSize);
      textEl.textContent = text;
      svg.appendChild(textEl);
      document.body.appendChild(svg);
      const width = textEl.getComputedTextLength();
      document.body.removeChild(svg);
      return width;
    };

    // Find widest model name - measure the joined version since horizontal mode joins lines
    const getWidestLabelWidth = (models) => {
      return Math.max(...models.map(m => {
        return measureSvgTextWidth(m.name, 12);
      }));
    };

    const container = document.getElementById("chart-container");
    const widestLabel = getWidestLabelWidth(sortedData);
    const totalModels = sortedData.length;

    function renderChart() {
      container.innerHTML = '';
      const containerWidth = container.offsetWidth;

      const fontFamily = 'Inter, system-ui, sans-serif';
      const barColor = '#4e79a7';
      const useHorizontalLayout = containerWidth < 640;

      const labelBarGap = 8;
      const horizontalLeftMargin = widestLabel + labelBarGap;
      const referenceWidth = 1000;
      const chartWidth = useHorizontalLayout ? containerWidth : referenceWidth;
      const barHeight = 28;
      const barSpacing = 8;

      const titleFontSize = 24;
      const subtitleFontSize = 13;
      const titleY = titleFontSize + 10;
      const subtitleY = titleY + subtitleFontSize + 8;
      const headerHeight = subtitleY + 15;

      const bottomMargin = useHorizontalLayout ? 35 : 100;
      const horizontalChartHeight = headerHeight + (totalModels * (barHeight + barSpacing)) + barSpacing + bottomMargin;
      const chartHeight = useHorizontalLayout ? horizontalChartHeight : chartWidth / 1.7;

      const config = {
        width: chartWidth,
        height: chartHeight,
        margin: useHorizontalLayout
          ? { top: headerHeight, right: 50, bottom: bottomMargin, left: horizontalLeftMargin }
          : { top: headerHeight, right: 80, bottom: 100, left: 80 },
      };

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", `0 0 ${config.width} ${config.height}`);
      svg.setAttribute("width", "100%");
      svg.setAttribute("height", "100%");
      svg.setAttribute("overflow", "visible");

      const chartAreaHeight = config.height - config.margin.top - config.margin.bottom;
      const chartAreaWidth = config.width - config.margin.left - config.margin.right;

      const headerSvg = `
        <text x="${config.width / 2}" y="${titleY}"
              font-family="${fontFamily}" font-size="${titleFontSize}" font-weight="bold"
              text-anchor="middle" fill="#333">FriendBench™</text>
        <text x="${config.width / 2}" y="${subtitleY}"
              font-family="${fontFamily}" font-size="${subtitleFontSize}"
              text-anchor="middle" fill="#666">A systematic assessment of amicability in large language models</text>
      `;

      if (useHorizontalLayout) {
        let barsSvg = '';
        sortedData.forEach((model, i) => {
          const y = config.margin.top + barSpacing + i * (barHeight + barSpacing);
          const hBarWidth = (model.score / 100) * chartAreaWidth;
          barsSvg += `
            <text x="${config.margin.left - labelBarGap}" y="${y + barHeight / 2 + 4}"
                  font-family="${fontFamily}" font-size="12" text-anchor="end" fill="#333">${model.name}</text>
            <path d="${roundedRightRect(config.margin.left, y, hBarWidth, barHeight, 4)}" fill="${barColor}">
              <title>${model.name}: ${model.score}</title>
            </path>
            <text x="${config.margin.left + hBarWidth + 6}" y="${y + barHeight / 2 + 4}"
                  font-family="${fontFamily}" font-size="11" text-anchor="start" fill="#555">${model.score}</text>
          `;
        });

        svg.innerHTML = headerSvg + `
          ${[0, 25, 50, 75, 100].map(tick => `
            <line x1="${config.margin.left + (tick / 100) * chartAreaWidth}" y1="${config.margin.top}"
                  x2="${config.margin.left + (tick / 100) * chartAreaWidth}" y2="${config.height - config.margin.bottom}"
                  stroke="${tick === 0 ? '#ccc' : '#e0e0e0'}" stroke-width="1"/>
          `).join('')}
          ${[0, 25, 50, 75, 100].map(tick => `
            <text x="${config.margin.left + (tick / 100) * chartAreaWidth}" y="${config.height - config.margin.bottom + 18}"
                  font-family="${fontFamily}" font-size="11" text-anchor="middle" fill="#888">${tick}</text>
          `).join('')}
          ${barsSvg}
        `;
      } else {
        let barsSvg = '';
        const vBarWidth = Math.min(100, chartAreaWidth / (totalModels + 1) - 10);
        const totalBarsWidth = vBarWidth * totalModels;
        const spacing = (chartAreaWidth - totalBarsWidth) / (totalModels + 1);

        sortedData.forEach((model, i) => {
          const x = config.margin.left + spacing + i * (vBarWidth + spacing);
          const vBarHeight = (model.score / 100) * chartAreaHeight;
          const y = config.height - config.margin.bottom - vBarHeight;
          const barCenter = x + vBarWidth / 2;
          const labelX = barCenter + 12;
          const labelY = config.height - config.margin.bottom + 14;

          barsSvg += `
            <path d="${roundedTopRect(x, y, vBarWidth, vBarHeight, 4)}" fill="${barColor}">
              <title>${model.name}: ${model.score}</title>
            </path>
            <text x="${labelX}" y="${labelY}"
                  font-family="${fontFamily}" font-size="11" text-anchor="end" fill="#333"
                  transform="rotate(-45, ${labelX}, ${labelY})">${model.name}</text>
          `;
        });

        svg.innerHTML = headerSvg + `
          ${[0, 25, 50, 75, 100].map(tick => `
            <line x1="${config.margin.left}" y1="${config.height - config.margin.bottom - (tick / 100) * chartAreaHeight}"
                  x2="${config.width - config.margin.right}" y2="${config.height - config.margin.bottom - (tick / 100) * chartAreaHeight}"
                  stroke="${tick === 0 ? '#ccc' : '#e0e0e0'}" stroke-width="1"/>
          `).join('')}
          ${[0, 25, 50, 75, 100].map(tick => `
            <text x="${config.margin.left - 10}" y="${config.height - config.margin.bottom - (tick / 100) * chartAreaHeight + 4}"
                  font-family="${fontFamily}" font-size="11" text-anchor="end" fill="#888">${tick}</text>
          `).join('')}
          <text x="${config.margin.left - 40}" y="${config.margin.top + chartAreaHeight / 2}"
                font-family="${fontFamily}" font-size="12" text-anchor="middle"
                fill="#888" transform="rotate(-90, ${config.margin.left - 40}, ${config.margin.top + chartAreaHeight / 2})">
            Friend Score
          </text>
          ${barsSvg}
        `;
      }

      container.appendChild(svg);
    }

    renderChart();

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(renderChart, 100);
    });

    // Populate quotes grid
    const quotesGrid = document.getElementById("quotes-grid");
    quotesData.forEach((quote) => {
      const quoteCard = document.createElement("div");
      quoteCard.className = "quote-card";

      const quoteText = document.createElement("div");
      quoteText.className = "quote-text";
      quoteText.innerHTML = `"${quote.text}"`;

      const attribution = document.createElement("div");
      attribution.className = "quote-attribution";

      // Wrap author in link if URL is provided
      const authorText = quote.url
        ? `<a href="${quote.url}" target="_blank" rel="noopener noreferrer" style="color: #1a73e8; text-decoration: underline; text-decoration-style: dotted;">${quote.author}</a>`
        : quote.author;
      attribution.innerHTML = `— ${authorText}`;

      // Add model reference (either inline or as icon)
      if (quote.models && quote.models.length > 0) {
        if (quote.showModelInline) {
          const modelInline = document.createElement("span");
          modelInline.className = "model-inline";
          modelInline.textContent = `(about ${quote.models.join(", ")})`;
          attribution.appendChild(modelInline);
        } else {
          const modelInfo = document.createElement("div");
          modelInfo.className = "model-info";

          // Create SVG icon
          modelInfo.innerHTML = `
            <svg class="model-icon" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <span class="tooltip">About: ${quote.models.join(", ")}</span>
          `;

          attribution.appendChild(modelInfo);
        }
      }

      quoteCard.appendChild(quoteText);
      quoteCard.appendChild(attribution);
      quotesGrid.appendChild(quoteCard);
    });
  </script>

  <footer style="
        text-align: center;
        margin-top: 40px;
        padding-bottom: 20px;
        width: 100%;
      ">
    <p style="color: #666; font-size: 14px">
      <a href="https://forms.gle/neHXHQefimeoVwuG7" style="
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s ease;
          " target="_blank" rel="noopener noreferrer">
        Apply to become a High Taste Tester™
      </a>
    </p>
    <p style="color: #999; font-size: 12px; margin-top: 10px">
      High Taste Testers 2025™
    </p>
  </footer>
</body>

</html>
